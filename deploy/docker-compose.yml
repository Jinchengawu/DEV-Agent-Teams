services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    environment:
      MODEL_SPEND_GUARD: "1"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8400"
      AGENT_DB_PATH: "/data"
      AUDIT_FILE: "/logs/audit.log"
    ports:
      - "8400:8400"
    volumes:
      - dev-agent-data:/data
      - dev-agent-logs:/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8400/health').then(r=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
    environment:
      PORT: "3000"
      NEXT_PUBLIC_GATEWAY_URL: "http://gateway:8400"
      GATEWAY_URL: "http://gateway:8400"
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  dev-agent-data:
  dev-agent-logs:
