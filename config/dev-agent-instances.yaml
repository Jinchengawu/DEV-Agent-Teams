# DEV-Agent 实例配置
version: 1

defaults:
  timeoutMs: 120000
  circuitBreaker:
    failureThreshold: 3
    coolDownSec: 120

instances:
  - id: dev-frontend
    label: "前端开发 Agent"
    baseUrl: "http://127.0.0.1:8201"
    tags: ["frontend", "react", "vue", "css", "ui", "typescript"]
    timeoutMs: 120000
    notes: "React/Vue 组件开发、UI/UX 实现、样式优化"
    skills:
      - react-development
      - vue-development
      - typescript-best-practices
      - css-tailwind

  - id: dev-backend
    label: "后端开发 Agent"
    baseUrl: "http://127.0.0.1:8202"
    tags: ["backend", "api", "database", "server", "python", "node", "go"]
    timeoutMs: 120000
    notes: "API 设计、数据库优化、业务逻辑开发"
    skills:
      - python-development
      - nodejs-development
      - api-design
      - database-design

  - id: dev-testing
    label: "测试开发 Agent"
    baseUrl: "http://127.0.0.1:8203"
    tags: ["testing", "test", "qa", "coverage", "e2e", "unit"]
    timeoutMs: 180000
    notes: "单元测试、集成测试、E2E 测试、覆盖率分析"
    skills:
      - pytest-development
      - jest-development
      - e2e-testing
      - tdd-practices

  - id: dev-devops
    label: "DevOps Agent"
    baseUrl: "http://127.0.0.1:8204"
    tags: ["devops", "docker", "k8s", "deploy", "ci/cd", "monitoring"]
    timeoutMs: 300000
    notes: "CI/CD 流水线、Docker 容器化、K8s 编排、监控告警"
    skills:
      - docker-management
      - kubernetes-deployment
      - ci-cd-pipeline
      - monitoring-setup
