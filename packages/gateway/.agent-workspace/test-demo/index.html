<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React + TypeScript + Tailwind CSS 测试</title>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel 来支持 JSX 和 TypeScript -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel" data-type="module">
        // TypeScript 接口定义
        interface CounterProps {
            initialValue?: number;
            step?: number;
        }
        
        interface CounterState {
            count: number;
            history: number[];
        }
        
        // React 组件
        const Counter: React.FC<CounterProps> = ({ initialValue = 0, step = 1 }) => {
            const [state, setState] = React.useState<CounterState>({
                count: initialValue,
                history: [initialValue]
            });
            
            const increment = () => {
                setState(prev => ({
                    count: prev.count + step,
                    history: [...prev.history, prev.count + step]
                }));
            };
            
            const decrement = () => {
                setState(prev => ({
                    count: prev.count - step,
                    history: [...prev.history, prev.count - step]
                }));
            };
            
            const reset = () => {
                setState({
                    count: initialValue,
                    history: [initialValue]
                });
            };
            
            return (
                <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
                    <div className="text-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">
                            React + TypeScript + Tailwind CSS
                        </h1>
                        <p className="text-gray-600">
                            测试演示 - 计数器组件
                        </p>
                    </div>
                    
                    <div className="text-center mb-8">
                        <div className="text-6xl font-bold text-indigo-600 mb-4">
                            {state.count}
                        </div>
                        <div className="text-sm text-gray-500">
                            步长: {step} | 初始值: {initialValue}
                        </div>
                    </div>
                    
                    <div className="flex justify-center space-x-4 mb-8">
                        <button
                            onClick={decrement}
                            className="px-6 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 
                                     transition-colors duration-200 font-semibold shadow-md"
                        >
                            减少
                        </button>
                        
                        <button
                            onClick={reset}
                            className="px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 
                                     transition-colors duration-200 font-semibold shadow-md"
                        >
                            重置
                        </button>
                        
                        <button
                            onClick={increment}
                            className="px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 
                                     transition-colors duration-200 font-semibold shadow-md"
                        >
                            增加
                        </button>
                    </div>
                    
                    <div className="bg-gray-50 rounded-lg p-4">
                        <h3 className="text-sm font-semibold text-gray-700 mb-2">
                            操作历史 (最近5次):
                        </h3>
                        <div className="flex flex-wrap gap-2">
                            {state.history.slice(-5).map((value, index) => (
                                <span
                                    key={index}
                                    className="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm"
                                >
                                    {value}
                                </span>
                            ))}
                        </div>
                    </div>
                    
                    <div className="mt-6 text-center text-xs text-gray-400">
                        <p>技术栈: React 18 + TypeScript + Tailwind CSS</p>
                        <p>测试时间: {new Date().toLocaleString('zh-CN')}</p>
                    </div>
                </div>
            );
        };
        
        // 渲染应用
        const App: React.FC = () => {
            return (
                <div className="flex justify-center items-center min-h-screen">
                    <Counter initialValue={0} step={1} />
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root')!);
        root.render(<App />);
    </script>
</body>
</html>
